name: Monthly Maintenance
on:
  workflow_dispatch: # Allows manual triggering of the workflow
  schedule:
    - cron: '0 6 25 * *' # Runs at 6:00 AM on the 25th of every month
jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Ensure full history is fetched

      - name: Set dynamic variables
        id: vars
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "MONTH_YEAR=$(date +'%m/%Y')" >> "$GITHUB_OUTPUT"
          echo "BRANCH_NAME=maintenance-$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      
      - name: Set Up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli
          coverage: none

      - name: Install SQLite support
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 php8.2-sqlite3

      - name: Configure Git
        run: |
          git config user.name "PROVEN MAINTENANCE BOT"
          git config user.email "developers@proven.us"

      - name: Create maintenance branch
        run: |
          git checkout -b "${{ steps.vars.outputs.BRANCH_NAME }}"

      # -----------------------------------------------------------------
      # Temporary SQLite-based WordPress installation for WP-CLI commands.
      # This installation is only used so plugin/theme update commands work.
      # -----------------------------------------------------------------
      - name: Prepare temporary WordPress config
        run: |
          mkdir -p .github/tmp
          touch .github/tmp/database.sqlite

          cat > wp-config.php <<'PHP'
          <?php
          define('DB_NAME', __DIR__ . '/.github/tmp/database.sqlite');
          define('DB_USER', '');
          define('DB_PASSWORD', '');
          define('DB_HOST', 'localhost');
          define('DB_CHARSET', 'utf8');
          define('DB_COLLATE', '');
          $table_prefix = 'wp_';

          define('WP_DEBUG', false);
          define('WP_HOME', 'http://localhost');
          define('WP_SITEURL', 'http://localhost');

          if (!defined('ABSPATH')) {
              define('ABSPATH', __DIR__ . '/');
          }

          require_once ABSPATH . 'wp-settings.php';
          PHP

      - name: Install SQLite integration plugin
        run: |
          mkdir -p wp-content/mu-plugins
          curl -L \
            https://github.com/aaemnnosttv/wp-sqlite-db/raw/master/src/db.php \
            -o wp-content/db.php

      - name: Install WordPress for WP-CLI
        run: |
          wp core install \
            --url="http://localhost" \
            --title="Maintenance" \
            --admin_user="admin" \
            --admin_password="password" \
            --admin_email="admin@localhost" \
            --skip-email

      # -----------------------------------------------------------------
      # Update WordPress dependencies using WP-CLI. This ensures updates 
      # are applied according to the site's current configuration and 
      # active plugins/themes.
      # -----------------------------------------------------------------

      - name: Update plugins
        id: plugin_update
        run: |
          {
            echo '## Plugin Updates'
            echo '```text'
            wp plugin update --all --format=table || true
            echo '```'
          } > plugin-update.md

      - name: Update themes
        id: theme_update
        run: |
          {
            echo '## Theme Updates'
            echo '```text'
            wp theme update --all --format=table || true
            echo '```'
          } > theme-update.md

      - name: Cleanup temporary CI files
        run: |
          git restore wp-config.php
          rm -f wp-content/db.php
          rm -f .github/tmp/database.sqlite

      # -----------------------------------------------------------------
      # Update WordPress core using Pantheon's upstream repository.
      # This mirrors Pantheon's preferred core structure.
      # -----------------------------------------------------------------
      - name: Update WordPress core from Pantheon upstream
        id: core_update
        run: |
          {
            echo '## WordPress Core Update'
            echo '```text'

            git pull -X theirs https://github.com/pantheon-systems/WordPress.git master --no-rebase --allow-unrelated-histories

            echo '```'
          } > core-update.md

      - name: Build pull request description
        run: |
          {
            echo "# Automated maintenance for ${{ steps.vars.outputs.MONTH_YEAR }}"
            echo
            cat core-update.md
            echo
            cat plugin-update.md
            echo
            cat theme-update.md
          } > pr-body.md

      - name: Check for changes
        id: changes
        run: |
          AHEAD=$(git rev-list --count origin/${{ github.event.repository.default_branch }}..HEAD)
          if git diff --quiet && git diff --cached --quiet && [ "$AHEAD" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "Automated maintenance ${{ steps.vars.outputs.DATE }}"

      - name: Push maintenance branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push --set-upstream origin "${{ steps.vars.outputs.BRANCH_NAME }}"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.vars.outputs.BRANCH_NAME }}" \
            --title "maintenance for ${{ steps.vars.outputs.MONTH_YEAR }}" \
            --body-file pr-body.md

      - name: No changes detected
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No updates were available. No pull request created."