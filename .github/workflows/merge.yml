name: Automerge

on:
  push:
    branches:
      - default

permissions:
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: pantheon-systems/upstream-update-build@e3e84cc61a151cb3d551ab855cf84fb794f54018 # v1.0.1
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
