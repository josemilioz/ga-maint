name: Maintenance Pull

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    env:
      BRANCH_NAME: maintenance-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set dynamic variables
        id: vars
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "MONTH_YEAR=$(date +'%m/%Y')" >> "$GITHUB_OUTPUT"
          echo "BRANCH_NAME=maintenance-$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: wp-cli
          coverage: none

      - name: Install SQLite support
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 php8.4-sqlite3

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create maintenance branch
        run: |
          git checkout -b "${{ steps.vars.outputs.BRANCH_NAME }}"

      # -----------------------------------------------------------------
      # Temporary SQLite-based WordPress installation for WP-CLI commands.
      # This installation is only used so plugin/theme update commands work.
      # -----------------------------------------------------------------
      - name: Prepare temporary WordPress config
        run: |
          mkdir -p .github/tmp
          touch .github/tmp/database.sqlite

          cat > wp-config.php <<'PHP'
          <?php
          define('DB_NAME', __DIR__ . '/.github/tmp/database.sqlite');
          define('DB_USER', '');
          define('DB_PASSWORD', '');
          define('DB_HOST', 'localhost');
          define('DB_CHARSET', 'utf8');
          define('DB_COLLATE', '');
          $table_prefix = 'wp_';

          define('WP_DEBUG', false);
          define('WP_HOME', 'http://example.com');
          define('WP_SITEURL', 'http://example.com');

          if (!defined('ABSPATH')) {
              define('ABSPATH', __DIR__ . '/');
          }

          require_once ABSPATH . 'wp-settings.php';
          PHP

      - name: Install SQLite integration plugin
        run: |
          mkdir -p wp-content/mu-plugins
          curl -L \
            https://github.com/aaemnnosttv/wp-sqlite-db/raw/master/src/db.php \
            -o wp-content/db.php

      - name: Install WordPress for WP-CLI
        run: |
          wp core install \
            --url="http://example.com" \
            --title="Maintenance" \
            --admin_user="admin" \
            --admin_password="password" \
            --admin_email="admin@example.com" \
            --skip-email

      # -----------------------------------------------------------------
      # Update WordPress core using Pantheon's upstream repository.
      # This mirrors Pantheon's preferred core structure.
      # -----------------------------------------------------------------
      - name: Update WordPress core from Pantheon upstream
        id: core_update
        run: |
          {
            echo '## WordPress Core Update'
            echo '```text'

            git remote add pantheon-upstream https://github.com/pantheon-systems/WordPress.git
            git fetch pantheon-upstream master

            git checkout pantheon-upstream/master -- \
              index.php \
              wp-admin \
              wp-includes \
              wp-*.php \
              xmlrpc.php \
              license.txt \
              readme.html || true

            wp core version

            echo '```'
          } > core-update.md

      - name: Update plugins
        id: plugin_update
        run: |
          {
            echo '## Plugin Updates'
            echo '```text'
            wp plugin update --all --format=table || true
            echo '```'
          } > plugin-update.md

      - name: Update themes
        id: theme_update
        run: |
          {
            echo '## Theme Updates'
            echo '```text'
            wp theme update --all --format=table || true
            echo '```'
          } > theme-update.md

      - name: Build pull request description
        run: |
          {
            echo "# Automated maintenance for ${{ steps.vars.outputs.MONTH_YEAR }}"
            echo
            cat core-update.md
            echo
            cat plugin-update.md
            echo
            cat theme-update.md
          } > pr-body.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "Automated maintenance $(date +'%Y-%m-%d')"

      - name: Push maintenance branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push --set-upstream origin "${{ steps.vars.outputs.BRANCH_NAME }}"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.vars.outputs.BRANCH_NAME }}" \
            --title "maintenance for ${{ steps.vars.outputs.MONTH_YEAR }}" \
            --body-file pr-body.md

      - name: No changes detected
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No updates were available. No pull request created."
