name: Pantheon Monthly Maintenance PR

on:
  workflow_dispatch: # Allows manual triggering of the workflow
  schedule:
    - cron: '0 6 25 * *' # Runs at 6:00 AM on the 25th of every month

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    env:
      PANTHEON_ENV: "dev"
      PANTHEON_BRANCH: "master"

    services:
      mariadb:
        image: mariadb:10.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Ensure full history is fetched

      - name: Set dynamic variables
        id: vars
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "MONTH_YEAR=$(date +'%m/%Y')" >> "$GITHUB_OUTPUT"
          echo "BRANCH_NAME=maintenance-$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Set Up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli
          coverage: none

      - name: Install Terminus
        run: |
          curl -L https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar --output /usr/local/bin/terminus
          chmod +x /usr/local/bin/terminus

      - name: Authenticate with Pantheon
        run: terminus auth:login --machine-token="${{ secrets.PANTHEON_MACHINE_TOKEN }}"

      - name: Configure Git
        run: |
          git config user.name "PROVEN MAINTENANCE BOT"
          git config user.email "developers@proven.us"

      - name: Add Pantheon Git Remote
        run: |
          terminus connection:set ${{ vars.PANTHEON_PROJECT_NAME }}.${{ env.PANTHEON_ENV }} git

          PANTHEON_GIT_URL=$(terminus connection:info ${{ vars.PANTHEON_PROJECT_NAME }}.${{ env.PANTHEON_ENV }} --field=git_url)
          git remote add pantheon "$PANTHEON_GIT_URL"
          echo "PANTHEON_GIT_URL=$PANTHEON_GIT_URL" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -m PEM -C "developers@proven.us" -f ~/.ssh/id_rsa -N ""
          terminus ssh-key:add ~/.ssh/id_rsa.pub --yes

          cat <<EOF >> ~/.ssh/config
          Host *.drush.in
            StrictHostKeyChecking no
          EOF

      - name: Create maintenance branch
        run: |
          git fetch pantheon
          git checkout -b "${{ steps.vars.outputs.BRANCH_NAME }}" pantheon/${{ env.PANTHEON_BRANCH }}

      # -----------------------------------------------------------------
      # Apply WordPress core updates via Pantheon's own upstream mechanism.
      # We branch from pantheon/master to preserve shared history, then
      # pull the new upstream commits. Before pushing to GitHub we strip
      # .github/ from every commit GitHub hasn't seen yet using
      # filter-branch, so the workflow-file permission check never fires.
      # Commit metadata (author, date, message) is preserved.
      # -----------------------------------------------------------------
      - name: Apply WordPress core upstream updates
        id: core_update
        run: |
          BEFORE=$(php -r "include 'wp-includes/version.php'; echo \$wp_version;")

          terminus upstream:updates:apply \
            --accept-upstream \
            -- ${{ vars.PANTHEON_PROJECT_NAME }}.${{ env.PANTHEON_ENV }}

          git pull pantheon ${{ env.PANTHEON_BRANCH }} --no-rebase

          # Rewrite every commit GitHub doesn't already have to remove
          # .github/ — keeps Pantheon history intact, just strips the
          # directory that triggers the workflow-permission check.
          BASE=$(git merge-base "origin/${{ github.event.repository.default_branch }}" HEAD)
          git filter-branch --force --index-filter \
            'git rm -rf --cached --ignore-unmatch .github/' \
            -- "$BASE"..HEAD

          AFTER=$(php -r "include 'wp-includes/version.php'; echo \$wp_version;")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "updated=true"  >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$AFTER" >> "$GITHUB_OUTPUT"

      - name: Download live database from Pantheon
        run: terminus ldb "${{ vars.PANTHEON_PROJECT_NAME }}"

      # -----------------------------------------------------------------
      # Write a local WordPress config so WP-CLI can connect to MariaDB.
      # wp-config.php loads wp-config-local.php when PANTHEON_ENVIRONMENT
      # is not set, so we never touch wp-config.php itself.
      # -----------------------------------------------------------------
      - name: Write local WordPress config
        run: |
          cp wp-config-local-sample.php wp-config-local.php
          sed -i "s/'database_name'/'wordpress'/"   wp-config-local.php
          sed -i "s/'database_username'/'wordpress'/" wp-config-local.php
          sed -i "s/'database_password'/'wordpress'/" wp-config-local.php
          sed -i "s/'database_host'/'127.0.0.1'/"   wp-config-local.php
          sed -i "s|<YOUR LOCAL DOMAIN>|http://localhost|g" wp-config-local.php

      - name: Import live database
        run: |
          zcat "$HOME/pantheon-local-copies/db/${{ vars.PANTHEON_PROJECT_NAME }}-db.tgz" | wp db import -

      # -----------------------------------------------------------------
      # Update WordPress dependencies using WP-CLI against real live data.
      # -----------------------------------------------------------------
      - name: Update plugins
        id: plugin_update
        run: |
          OUTPUT=$(wp plugin update --all --format=json 2>/dev/null || echo '[]')
          TABLE=$(printf '%s' "$OUTPUT" | jq -r '
            if (type != "array") or (length == 0) then "_No plugins were updated._"
            else
              "| Plugin | Old | New | Status |\n|--------|-----|-----|--------|\n" +
              ([.[] | "| \(.name) | \(.version // .old_version // "—") | \(.update_version // .new_version // "—") | \(.status) |"] | join("\n"))
            end
          ' 2>/dev/null || echo "_No plugins were updated._")
          {
            echo "table<<WPCLI_DELIM"
            printf '%s\n' "$TABLE"
            echo "WPCLI_DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Update themes
        id: theme_update
        run: |
          OUTPUT=$(wp theme update --all --format=json 2>/dev/null || echo '[]')
          TABLE=$(printf '%s' "$OUTPUT" | jq -r '
            if (type != "array") or (length == 0) then "_No themes were updated._"
            else
              "| Theme | Old | New | Status |\n|-------|-----|-----|--------|\n" +
              ([.[] | "| \(.name) | \(.version // .old_version // "—") | \(.update_version // .new_version // "—") | \(.status) |"] | join("\n"))
            end
          ' 2>/dev/null || echo "_No themes were updated._")
          {
            echo "table<<WPCLI_DELIM"
            printf '%s\n' "$TABLE"
            echo "WPCLI_DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Cleanup local config
        run: rm -f wp-config-local.php

      - name: Check for changes
        id: changes
        run: |
          AHEAD=$(git rev-list --count origin/${{ github.event.repository.default_branch }}..HEAD)
          if git diff --quiet && git diff --cached --quiet && [ "$AHEAD" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit plugin and theme changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -- ':!.github/workflows/'
          # Core update commits already landed via the Pantheon pull above.
          # Only create a new commit if WP-CLI staged additional plugin/theme changes.
          if ! git diff --cached --quiet; then
            git commit -m "Automated maintenance ${{ steps.vars.outputs.DATE }}"
          fi

      - name: Push maintenance branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.vars.outputs.BRANCH_NAME }}"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN_TABLE: ${{ steps.plugin_update.outputs.table }}
          THEME_TABLE: ${{ steps.theme_update.outputs.table }}
          CORE_UPDATED: ${{ steps.core_update.outputs.updated }}
          CORE_VERSION: ${{ steps.core_update.outputs.version }}
          MONTH_YEAR: ${{ steps.vars.outputs.MONTH_YEAR }}
          BRANCH_NAME: ${{ steps.vars.outputs.BRANCH_NAME }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$CORE_UPDATED" = "true" ]; then
            CORE_LINE="Updated to **${CORE_VERSION}**"
          else
            CORE_LINE="No update — already at **${CORE_VERSION}**"
          fi

          PR_BODY="$(printf '# Automated maintenance %s\n\n## WordPress Core\n%s\n\n## Plugins\n%s\n\n## Themes\n%s' \
            "$MONTH_YEAR" "$CORE_LINE" "$PLUGIN_TABLE" "$THEME_TABLE")"

          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "maintenance for $MONTH_YEAR" \
            --body "$PR_BODY"

      - name: Remove SSH Key
        if: always()
        run: |
          export COLUMNS=256
          LAST_SSH_KEY_ID=$(terminus ssh-key:list | grep "developers@proven.us" | awk '{ print $1 }')
          if [ -n "$LAST_SSH_KEY_ID" ]; then
            echo "$LAST_SSH_KEY_ID" | while IFS= read -r KEY; do
              [ -n "$KEY" ] && terminus ssh-key:remove "$KEY"
            done
          fi

      - name: No changes detected
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No updates were available. No pull request created."
