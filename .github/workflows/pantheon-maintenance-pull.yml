name: Pantheon Monthly Maintenance PR

on:
  workflow_dispatch: # Allows manual triggering of the workflow
  schedule:
    - cron: '0 6 25 * *' # Runs at 6:00 AM on the 25th of every month

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Ensure full history is fetched

      - name: Set dynamic variables
        id: vars
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "MONTH_YEAR=$(date +'%m/%Y')" >> "$GITHUB_OUTPUT"
          echo "BRANCH_NAME=maintenance-$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Set Up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli
          coverage: none

      - name: Install Terminus
        run: |
          curl -L https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar --output /usr/local/bin/terminus
          chmod +x /usr/local/bin/terminus

      - name: Authenticate with Pantheon
        run: terminus auth:login --machine-token="${{ secrets.PANTHEON_MACHINE_TOKEN }}"

      - name: Configure Git
        run: |
          git config user.name "PROVEN MAINTENANCE BOT"
          git config user.email "developers@proven.us"

      - name: Create maintenance branch
        run: |
          git checkout -b "${{ steps.vars.outputs.BRANCH_NAME }}"

      - name: Download live database from Pantheon
        run: terminus ldb "${{ vars.PANTHEON_PROJECT_NAME }}"

      # -----------------------------------------------------------------
      # Write a local WordPress config so WP-CLI can connect to MariaDB.
      # wp-config.php loads wp-config-local.php when PANTHEON_ENVIRONMENT
      # is not set, so we never touch wp-config.php itself.
      # -----------------------------------------------------------------
      - name: Write local WordPress config
        run: |
          cp wp-config-local-sample.php wp-config-local.php
          sed -i "s/'database_name'/'wordpress'/"   wp-config-local.php
          sed -i "s/'database_username'/'wordpress'/" wp-config-local.php
          sed -i "s/'database_password'/'wordpress'/" wp-config-local.php
          sed -i "s/'database_host'/'127.0.0.1'/"   wp-config-local.php
          sed -i "s|<YOUR LOCAL DOMAIN>|http://localhost|g" wp-config-local.php

      - name: Import live database
        run: |
          mkdir -p /tmp/db-import
          tar -xzf "$HOME/pantheon-local-copies/db/${{ vars.PANTHEON_PROJECT_NAME }}-db.tgz" -C /tmp/db-import/
          SQL_FILE=$(find /tmp/db-import -name "*.sql" | head -1)
          wp db import "$SQL_FILE"

      # -----------------------------------------------------------------
      # Update WordPress dependencies using WP-CLI against real live data.
      # -----------------------------------------------------------------
      - name: Update plugins
        id: plugin_update
        run: |
          {
            echo '## Plugin Updates'
            echo '```text'
            wp plugin update --all --format=table
            echo '```'
          } > plugin-update.md

      - name: Update themes
        id: theme_update
        run: |
          {
            echo '## Theme Updates'
            echo '```text'
            wp theme update --all --format=table
            echo '```'
          } > theme-update.md

      - name: Cleanup local config
        run: rm -f wp-config-local.php

      # -----------------------------------------------------------------
      # Update WordPress core using Pantheon's upstream repository.
      # -----------------------------------------------------------------
      - name: Update WordPress core from Pantheon upstream
        id: core_update
        run: |
          {
            echo '## WordPress Core Update'
            echo '```text'
            git pull -X theirs https://github.com/pantheon-systems/WordPress.git master --no-rebase --allow-unrelated-histories --no-edit
            echo '```'
          } > core-update.md

      - name: Build pull request description
        run: |
          {
            echo "# Automated maintenance for ${{ steps.vars.outputs.MONTH_YEAR }}"
            echo
            cat core-update.md
            echo
            cat plugin-update.md
            echo
            cat theme-update.md
          } > pr-body.md

      - name: Check for changes
        id: changes
        run: |
          AHEAD=$(git rev-list --count origin/${{ github.event.repository.default_branch }}..HEAD)
          if git diff --quiet && git diff --cached --quiet && [ "$AHEAD" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "Automated maintenance ${{ steps.vars.outputs.DATE }}"

      - name: Push maintenance branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push --set-upstream origin "${{ steps.vars.outputs.BRANCH_NAME }}"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.vars.outputs.BRANCH_NAME }}" \
            --title "maintenance for ${{ steps.vars.outputs.MONTH_YEAR }}" \
            --body-file pr-body.md

      - name: No changes detected
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No updates were available. No pull request created."
