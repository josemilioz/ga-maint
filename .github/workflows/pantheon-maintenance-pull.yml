name: Pantheon Monthly Maintenance PR

on:
  workflow_dispatch: # Allows manual triggering of the workflow
  schedule:
    - cron: '0 6 25 * *' # Runs at 6:00 AM on the 25th of every month

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    env:
      PANTHEON_ENV: "dev"
      PANTHEON_BRANCH: "master"

    services:
      mariadb:
        image: mariadb:10.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Ensure full history is fetched

      - name: Set dynamic variables
        id: vars
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "MONTH_YEAR=$(date +'%m/%Y')" >> "$GITHUB_OUTPUT"
          echo "BRANCH_NAME=maintenance-$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Set Up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli
          coverage: none

      - name: Install Terminus
        run: |
          curl -L https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar --output /usr/local/bin/terminus
          chmod +x /usr/local/bin/terminus

      - name: Authenticate with Pantheon
        run: terminus auth:login --machine-token="${{ secrets.PANTHEON_MACHINE_TOKEN }}"

      - name: Configure Git
        run: |
          git config user.name "PROVEN MAINTENANCE BOT"
          git config user.email "developers@proven.us"

      - name: Add Pantheon Git Remote
        run: |
          terminus connection:set ${{ vars.PANTHEON_PROJECT_NAME }}.${{ env.PANTHEON_ENV }} git

          PANTHEON_GIT_URL=$(terminus connection:info ${{ vars.PANTHEON_PROJECT_NAME }}.${{ env.PANTHEON_ENV }} --field=git_url)
          git remote add pantheon "$PANTHEON_GIT_URL"
          echo "PANTHEON_GIT_URL=$PANTHEON_GIT_URL" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -m PEM -C "developers@proven.us" -f ~/.ssh/id_rsa -N ""
          terminus ssh-key:add ~/.ssh/id_rsa.pub --yes

          cat <<EOF >> ~/.ssh/config
          Host *.drush.in
            StrictHostKeyChecking no
          EOF

      - name: Create maintenance branch
        run: |
          git fetch pantheon
          git checkout -b "${{ steps.vars.outputs.BRANCH_NAME }}" pantheon/${{ env.PANTHEON_BRANCH }}

      - name: Snapshot workflow files
        run: git ls-tree -r --name-only HEAD -- .github/workflows/ | sort > /tmp/our_workflows.txt

      - name: Apply WordPress core upstream updates
        id: core_update
        run: |
          BEFORE=$(php -r "include 'wp-includes/version.php'; echo \$wp_version;")

          git pull -X theirs https://github.com/pantheon-systems/WordPress --no-rebase --no-edit

          AFTER=$(php -r "include 'wp-includes/version.php'; echo \$wp_version;")
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "updated=true"  >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$AFTER" >> "$GITHUB_OUTPUT"

      - name: Remove upstream workflow files
        run: |
          FOREIGN=$(comm -23 \
            <(git ls-tree -r --name-only HEAD -- .github/workflows/ | sort) \
            /tmp/our_workflows.txt)
          if [ -n "$FOREIGN" ]; then
            echo "$FOREIGN" | xargs git rm -f
            git commit -m "Remove upstream workflow files"
          fi

      - name: Download live database from Pantheon
        run: terminus ldb "${{ vars.PANTHEON_PROJECT_NAME }}"

      # -----------------------------------------------------------------
      # Write a local WordPress config so WP-CLI can connect to MariaDB.
      # wp-config.php loads wp-config-local.php when PANTHEON_ENVIRONMENT
      # is not set, so we never touch wp-config.php itself.
      # -----------------------------------------------------------------
      - name: Write local WordPress config
        run: |
          cp wp-config-local-sample.php wp-config-local.php
          sed -i "s/'database_name'/'wordpress'/"   wp-config-local.php
          sed -i "s/'database_username'/'wordpress'/" wp-config-local.php
          sed -i "s/'database_password'/'wordpress'/" wp-config-local.php
          sed -i "s/'database_host'/'127.0.0.1'/"   wp-config-local.php
          sed -i "s|<YOUR LOCAL DOMAIN>|http://localhost|g" wp-config-local.php

      - name: Import live database
        run: |
          zcat "$HOME/pantheon-local-copies/db/${{ vars.PANTHEON_PROJECT_NAME }}-db.tgz" | wp db import -

      # -----------------------------------------------------------------
      # Update WordPress dependencies using WP-CLI against real live data.
      # -----------------------------------------------------------------
      - name: Update plugins
        id: plugin_update
        run: |
          RAW=$(wp plugin update --all 2>/dev/null | grep -E '^\+|^\||^(Success|Error):')
          SUMMARY=$(printf '%s' "$RAW" | grep -E '^(Success|Error):' | tail -1)
          {
            echo "output<<WPCLI_DELIM"
            printf '%s\n' "${RAW:-No output.}"
            echo "WPCLI_DELIM"
            echo "summary=${SUMMARY:-Unknown}"
          } >> "$GITHUB_OUTPUT"

      - name: Update themes
        id: theme_update
        run: |
          RAW=$(wp theme update --all 2>/dev/null | grep -E '^\+|^\||^(Success|Error):')
          SUMMARY=$(printf '%s' "$RAW" | grep -E '^(Success|Error):' | tail -1)
          {
            echo "output<<WPCLI_DELIM"
            printf '%s\n' "${RAW:-No output.}"
            echo "WPCLI_DELIM"
            echo "summary=${SUMMARY:-Unknown}"
          } >> "$GITHUB_OUTPUT"

      - name: Cleanup local config
        run: rm -f wp-config-local.php

      - name: Check for changes
        id: changes
        run: |
          AHEAD=$(git rev-list --count origin/${{ github.event.repository.default_branch }}..HEAD)
          if git diff --quiet && git diff --cached --quiet && [ "$AHEAD" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit plugin and theme changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -- ':!.github/workflows/'
          # Core update commits already landed via the Pantheon pull above.
          # Only create a new commit if WP-CLI staged additional plugin/theme changes.
          if ! git diff --cached --quiet; then
            git commit -m "Automated maintenance ${{ steps.vars.outputs.DATE }}"
          fi

      - name: Push maintenance branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.vars.outputs.BRANCH_NAME }}"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN_OUTPUT: ${{ steps.plugin_update.outputs.output }}
          THEME_OUTPUT: ${{ steps.theme_update.outputs.output }}
          CORE_UPDATED: ${{ steps.core_update.outputs.updated }}
          CORE_VERSION: ${{ steps.core_update.outputs.version }}
          MONTH_YEAR: ${{ steps.vars.outputs.MONTH_YEAR }}
          BRANCH_NAME: ${{ steps.vars.outputs.BRANCH_NAME }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$CORE_UPDATED" = "true" ]; then
            CORE_LINE="Updated to **${CORE_VERSION}**"
          else
            CORE_LINE="No update — already at **${CORE_VERSION}**"
          fi

          PR_BODY="$(printf '# Automated maintenance %s\n\n## WordPress Core\n%s\n\n## Plugins\n```\n%s\n```\n\n## Themes\n```\n%s\n```' \
            "$MONTH_YEAR" "$CORE_LINE" "${PLUGIN_OUTPUT:-No output.}" "${THEME_OUTPUT:-No output.}")"

          PR_URL=$(gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "Maintenance for $MONTH_YEAR" \
            --body "$PR_BODY")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Remove SSH Key
        if: always()
        run: |
          export COLUMNS=256
          LAST_SSH_KEY_ID=$(terminus ssh-key:list | grep "developers@proven.us" | awk '{ print $1 }')
          if [ -n "$LAST_SSH_KEY_ID" ]; then
            echo "$LAST_SSH_KEY_ID" | while IFS= read -r KEY; do
              [ -n "$KEY" ] && terminus ssh-key:remove "$KEY"
            done
          fi

      - name: No changes detected
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No updates were available. No pull request created."

      - name: Notify Slack - PR Created
        if: always() && steps.create_pr.outputs.pr_url != ''
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL_ID }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          MONTH_YEAR: ${{ steps.vars.outputs.MONTH_YEAR }}
          CORE_UPDATED: ${{ steps.core_update.outputs.updated }}
          CORE_VERSION: ${{ steps.core_update.outputs.version }}
          PLUGIN_SUMMARY: ${{ steps.plugin_update.outputs.summary }}
          THEME_SUMMARY: ${{ steps.theme_update.outputs.summary }}
          PROJECT_NAME: ${{ vars.PANTHEON_PROJECT_NAME }}
        run: |
          [ "$CORE_UPDATED" = "true" ] \
            && CORE_MSG="Updated to *${CORE_VERSION}*" \
            || CORE_MSG="Already at *${CORE_VERSION}*"

          PAYLOAD=$(jq -n \
            --arg ch  "$SLACK_CHANNEL" \
            --arg url "$PR_URL" \
            --arg my  "$MONTH_YEAR" \
            --arg cm  "$CORE_MSG" \
            --arg pm  "$PLUGIN_SUMMARY" \
            --arg tm  "$THEME_SUMMARY" \
            --arg pn  "$PROJECT_NAME" \
            '{
              channel: $ch,
              text: "🚀 Maintenance PR ready for review!",
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: "🚀 *Maintenance PR ready for review!*\n🏗️ *Project:* \($pn)\n📅 *Maintenance for:* \($my)\n⚙️ *WordPress core:* \($cm)\n🧩 *Plugins:* \($pm)\n🎨 *Themes:* \($tm)\n🔗 <\($url)|View Pull Request>"
                }
              }]
            }')

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")
          echo "Slack response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || { echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"; exit 1; }

      - name: Notify Slack - No Changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL_ID }}
          MONTH_YEAR: ${{ steps.vars.outputs.MONTH_YEAR }}
          PROJECT_NAME: ${{ vars.PANTHEON_PROJECT_NAME }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ch "$SLACK_CHANNEL" \
            --arg my "$MONTH_YEAR" \
            --arg pn "$PROJECT_NAME" \
            '{
              channel: $ch,
              text: "ℹ️ No maintenance needed this month.",
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: "ℹ️ *No maintenance needed for \($my).*\n🏗️ *Project:* \($pn)\n✅ WordPress core, plugins and themes are all up to date."
                }
              }]
            }')

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")
          echo "Slack response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || { echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"; exit 1; }

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          PROJECT_NAME: ${{ vars.PANTHEON_PROJECT_NAME }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ch   "$SLACK_CHANNEL" \
            --arg url  "$RUN_URL" \
            --arg repo "$REPO" \
            --arg pn   "$PROJECT_NAME" \
            '{
              channel: $ch,
              text: "🚨 Maintenance workflow failed!",
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: "🚨 *Maintenance workflow failed!*\n🏗️ *Project:* \($pn)\n📋 *Repository:* \($repo)\n🔗 <\($url)|View failed run>\n👀 Check the logs and fix before the next cycle."
                }
              }]
            }')

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")
          echo "Slack response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || { echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"; exit 1; }
