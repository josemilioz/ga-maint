name: _Teamwork Test

on:
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  teamwork:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Teamwork
        run: |
          AUTH=$(printf '%s:X' "${{ secrets.TEAMWORK_API_TOKEN }}" | base64)

          # Find the open maintenance task
          TASK_RESPONSE=$(curl -s -G \
            -H "Authorization: Basic $AUTH" \
            --data-urlencode "projectIds=${{ vars.TEAMWORK_PROJECT_ID }}" \
            --data-urlencode "searchTerm=${{ vars.TEAMWORK_TASK_SEARCH_TERM }}" \
            "${{ vars.TEAMWORK_SITE_URL }}/projects/api/v3/tasks.json") || true
          TASK_ID=$(printf '%s' "$TASK_RESPONSE" | jq -r '.tasks[0].id // empty' 2>/dev/null) || true

          if [ -z "$TASK_ID" ]; then
            echo "No task found, skipping stage move and comment."
            exit 0
          fi

          echo "TASK_ID: $TASK_ID"

          # Get the project to extract the workflow ID, then get its stages
          WORKFLOW_ID=$(curl -s \
            -H "Authorization: Basic $AUTH" \
            "${{ vars.TEAMWORK_SITE_URL }}/projects/api/v3/projects/${{ vars.TEAMWORK_PROJECT_ID }}.json" \
            | jq -r '.project.workflows[0].id // empty' 2>/dev/null) || true

          echo "WORKFLOW_ID: $WORKFLOW_ID"

          if [ -n "$WORKFLOW_ID" ]; then
            STAGES=$(curl -s \
              -H "Authorization: Basic $AUTH" \
              "${{ vars.TEAMWORK_SITE_URL }}/projects/api/v3/workflows/${WORKFLOW_ID}/stages.json")

            UAT_STAGE_ID=$(printf '%s' "$STAGES" | jq -r --arg n "${{ vars.TEAMWORK_STAGE_UAT }}" '.stages[] | select(.name == $n) | .id // empty' 2>/dev/null) || true
            IP_STAGE_ID=$(printf '%s' "$STAGES" | jq -r --arg n "${{ vars.TEAMWORK_STAGE_IN_PROGRESS }}" '.stages[] | select(.name == $n) | .id // empty' 2>/dev/null) || true

            echo "UAT_STAGE_ID: $UAT_STAGE_ID"
            echo "IP_STAGE_ID: $IP_STAGE_ID"

            MOVED=false
            if [ -n "$UAT_STAGE_ID" ]; then
              HTTP=$(curl -s -o /dev/null -w '%{http_code}' -X PATCH \
                -H "Authorization: Basic $AUTH" \
                -H "Content-Type: application/json" \
                -d "{\"workflowId\": ${WORKFLOW_ID}, \"stageId\": ${UAT_STAGE_ID}, \"positionAfterTask\": -1}" \
                "${{ vars.TEAMWORK_SITE_URL }}/projects/api/v3/tasks/${TASK_ID}/workflows/${WORKFLOW_ID}.json") || true
              if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
                MOVED=true
                echo "Task moved to ${{ vars.TEAMWORK_STAGE_UAT }}."
              fi
            fi

            if [ "$MOVED" = "false" ] && [ -n "$IP_STAGE_ID" ]; then
              echo "Falling back to ${{ vars.TEAMWORK_STAGE_IN_PROGRESS }}."
              curl -s -X PATCH \
                -H "Authorization: Basic $AUTH" \
                -H "Content-Type: application/json" \
                -d "{\"workflowId\": ${WORKFLOW_ID}, \"stageId\": ${IP_STAGE_ID}, \"positionAfterTask\": -1}" \
                "${{ vars.TEAMWORK_SITE_URL }}/projects/api/v3/tasks/${TASK_ID}/workflows/${WORKFLOW_ID}.json" || true
            fi
          fi

          # Dummy WP-CLI JSON output (mimics: wp plugin update --all --format=json)
          PLUGIN_JSON='[
            {"name":"Akismet Anti-Spam","old_version":"5.3.3","new_version":"5.3.4","status":"Updated"},
            {"name":"Hello Dolly","old_version":"1.7.2","new_version":"1.7.3","status":"Updated"},
            {"name":"Yoast SEO","old_version":"22.1","new_version":"22.2","status":"Updated"}
          ]'

          PLUGIN_ROWS=$(printf '%s' "$PLUGIN_JSON" | jq -r \
            '[.[] | "<tr><td>\(.name)</td><td>\(.old_version)</td><td>\(.new_version)</td><td>\(.status)</td></tr>"] | join("")')

          BODY="<h2>Maintenance Test</h2><h3>Plugins</h3><table><thead><tr><th>Plugin</th><th>Old Version</th><th>New Version</th><th>Status</th></tr></thead><tbody>${PLUGIN_ROWS}</tbody></table>"
          COMMENT_JSON=$(jq -n --arg body "$BODY" '{"comment": {"body": $body, "content-type": "html"}}')
          curl -s -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_JSON" \
            "${{ vars.TEAMWORK_SITE_URL }}/tasks/${TASK_ID}/comments.json" || true
          echo "Comment posted to Teamwork task."