name: Pantheon Maintenance Deploy

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to delete multidev for (valid only for testing)'
        required: false
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  deploy:

    if: |
      github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'maintenance-') || github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    env:
      PANTHEON_ENV: "dev"
      PANTHEON_BRANCH: "master"


    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Ensure full history is fetched

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl, xml, zip, mysql

      - name: Install Terminus
        run: |
          curl -L https://github.com/pantheon-systems/terminus/releases/latest/download/terminus.phar --output /usr/local/bin/terminus
          chmod +x /usr/local/bin/terminus

      - name: Authenticate with Pantheon
        run: terminus auth:login --machine-token="${{ secrets.PANTHEON_MACHINE_TOKEN }}"

      - name: Configure Git
        run: |
          git config user.name "PROVEN MAINTENANCE BOT"
          git config user.email "developers@proven.us"

      - name: Add Pantheon Git Remote
        run: |
          # Establish the environment as git
          terminus connection:set ${{ vars.PANTHEON_PROJECT_NAME }}.${{ env.PANTHEON_ENV }} git

          # Get Pantheon Git URL and set it as a remote
          export PANTHEON_GIT_URL=$(terminus connection:info ${{ vars.PANTHEON_PROJECT_NAME }}.${{ env.PANTHEON_ENV }} --field=git_url)
          git remote add pantheon $PANTHEON_GIT_URL

          echo "PANTHEON_GIT_URL=$PANTHEON_GIT_URL" >> $GITHUB_ENV

          # Check the remotes
          git remote -v

      - name: Setup the SSH Key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -m PEM -C "developers@proven.us" -f ~/.ssh/id_rsa -N ""
          terminus ssh-key:add ~/.ssh/id_rsa.pub --yes

          PANTHEON_SSH_KEY_DOMAIN=$(echo "${{ env.PANTHEON_GIT_URL }}" | awk -F'[@/]' '{print $4}')

          cat <<EOF >> ~/.ssh/config
          Host *.drush.in
            StrictHostKeyChecking no
          EOF

          # ssh-keyscan -H "$PANTHEON_SSH_KEY_DOMAIN" >> ~/.ssh/known_hosts

      - name: Push code to Pantheon
        id: push
        run: |
          git fetch pantheon
          git push --force pantheon HEAD:refs/heads/${{ env.PANTHEON_BRANCH }}
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Push site all the way to the Test environment
        run: |
          terminus env:deploy ${{ vars.PANTHEON_PROJECT_NAME }}.test --note="chore: automated maintenance $(date +'%Y-%m-%d')" --yes

      - name: Run database updates
        run: |
          terminus wp ${{ vars.PANTHEON_PROJECT_NAME }}.dev -- core update-db
          terminus wp ${{ vars.PANTHEON_PROJECT_NAME }}.test -- core update-db

      - name: Delete PR multidev
        if: github.event.pull_request.number != '' || inputs.pr_number != ''
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          terminus multidev:delete ${{ vars.PANTHEON_PROJECT_NAME }}.pr-${PR_NUMBER} --delete-branch --yes

      - name: Notify Teamwork - Deployed
        if: github.event_name == 'pull_request'
        env:
          TEAMWORK_SITE_URL: ${{ vars.TEAMWORK_SITE_URL }}
          TEAMWORK_API_TOKEN: ${{ secrets.TEAMWORK_API_TOKEN }}
          TEAMWORK_TASK_SEARCH_TERM: ${{ vars.TEAMWORK_TASK_SEARCH_TERM }}
          TEAMWORK_PROJECT_ID: ${{ vars.TEAMWORK_PROJECT_ID }}
          TEAMWORK_STAGE_DEPLOYED: ${{ vars.TEAMWORK_STAGE_DEPLOYED }}
        run: |
          BASE_URL="https://${TEAMWORK_SITE_URL}"
          AUTH=$(printf '%s:x' "$TEAMWORK_API_TOKEN" | base64)

          TASK_RESPONSE=$(curl -s \
            -H "Authorization: Basic $AUTH" \
            "${BASE_URL}/projects/api/v3/tasks.json?searchTerm=${TEAMWORK_TASK_SEARCH_TERM}&projectId=${TEAMWORK_PROJECT_ID}&status=active")
          TASK_ID=$(printf '%s' "$TASK_RESPONSE" | jq -r '.tasks[0].id // empty')

          if [ -z "$TASK_ID" ]; then
            echo "No task found, skipping."
            exit 0
          fi

          WORKFLOW_ID=$(curl -s \
            -H "Authorization: Basic $AUTH" \
            "${BASE_URL}/projects/api/v3/projects/${TEAMWORK_PROJECT_ID}/workflows.json" \
            | jq -r '.workflows[0].id // empty')

          if [ -z "$WORKFLOW_ID" ]; then
            echo "No workflow found, skipping stage move."
            exit 0
          fi

          STAGE_ID=$(curl -s \
            -H "Authorization: Basic $AUTH" \
            "${BASE_URL}/projects/api/v3/workflows/${WORKFLOW_ID}/stages.json" \
            | jq -r --arg n "$TEAMWORK_STAGE_DEPLOYED" '.stages[] | select(.name == $n) | .id // empty')

          if [ -n "$STAGE_ID" ]; then
            curl -s -X PUT \
              -H "Authorization: Basic $AUTH" \
              -H "Content-Type: application/json" \
              -d "{\"workflowId\": ${WORKFLOW_ID}, \"stageId\": ${STAGE_ID}, \"positionAfterTask\": -1}" \
              "${BASE_URL}/projects/api/v3/tasks/${TASK_ID}/workflowstage.json" || true
            echo "Task moved to ${TEAMWORK_STAGE_DEPLOYED}."
          else
            echo "Stage '${TEAMWORK_STAGE_DEPLOYED}' not found, skipping."
          fi

      - name: Remove the last SSH Key we Added to Pantheon
        if: always()
        run: |
          # grab the ID and use it to remove the key
          export COLUMNS=256 # So the table displayed by terminus won't split into useless lines

          terminus ssh-key:list

          LAST_SSH_KEY_ID=$(terminus ssh-key:list | grep "developers@proven.us" | awk '{ print $1 }')

          if [ -n "$LAST_SSH_KEY_ID" ] && [ '.' !=  "$LAST_SSH_KEY_ID" ]; then
            echo "$LAST_SSH_KEY_ID" | while IFS= read -r KEY; do
              if [ -n "$KEY" ]; then
                terminus ssh-key:remove "$KEY"
              fi
            done
          fi

      - name: Notify Slack - Deployed
        if: always() && steps.push.outputs.pushed == 'true'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PROJECT_NAME: ${{ vars.PANTHEON_PROJECT_NAME }}
          TEST_URL: https://test-${{ vars.PANTHEON_PROJECT_NAME }}.pantheonsite.io
        run: |
          PAYLOAD=$(jq -n \
            --arg ch   "$SLACK_CHANNEL" \
            --arg url  "$RUN_URL" \
            --arg pn   "$PROJECT_NAME" \
            --arg test "$TEST_URL" \
            '{
              channel: $ch,
              text: "✅ Code deployed to Pantheon dev!",
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: "✅ *\($pn) is ready in Pantheon!*\nThe maintenance update was successfully deployed all the way to the test environment.\n🚀 You can now promote it to live from the Pantheon dashboard.\n🌐 <\($test)|View test environment>\n🔗 <\($url)|View workflow run>"
                }
              }]
            }')

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")
          echo "Slack response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || { echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"; exit 1; }

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          PROJECT_NAME: ${{ vars.PANTHEON_PROJECT_NAME }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ch   "$SLACK_CHANNEL" \
            --arg url  "$RUN_URL" \
            --arg repo "$REPO" \
            --arg pn   "$PROJECT_NAME" \
            '{
              channel: $ch,
              text: "🚨 Deploy to Pantheon failed!",
              blocks: [{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: "🚨 *Deploy to Pantheon failed for \($pn)!*\n📋 *Repository:* \($repo)\n🔗 <\($url)|View failed run>\n👀 Check the logs before retrying."
                }
              }]
            }')

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")
          echo "Slack response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.ok == true' || { echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"; exit 1; }
